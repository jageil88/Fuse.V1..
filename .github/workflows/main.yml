name: Build Fuse APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix react version
        run: sed -i 's/"react": "18.3.2"/"react": "18.3.1"/' package.json

      - name: Install deps
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Init EAS project
        run: eas init --id fuse-scooter --non-interactive || true

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive --no-wait
